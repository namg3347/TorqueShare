spring:
  application:
    name: torqueshare
  data:
    mongodb:
      auto-index-creation: true
    redis:
      url: ${REDIS_URL}
  mongodb:
    uri: ${MONGODB_URI}
    database: torque-share-db




aws:
  s3:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    region: ${AWS_REGION_CODE}
    bucketName: ${AWS_BUCKET_NAME}
